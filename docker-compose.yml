services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: strapi_musteri_a
      MARIADB_USER: strapi
      MARIADB_PASSWORD: strapipassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  strapi:
    build: ./strapi
    environment:
      DATABASE_HOST: mariadb
      DATABASE_PORT: 3306
      DATABASE_NAME: strapi_musteri_a
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapipassword
    ports:
      - "1337:1337"
    depends_on:
      - mariadb

  frontend:
    build: ./frontend
    environment:
      # docker-compose içinde Strapi'ye container adıyla erişilir, localhost değil!
      NEXT_PUBLIC_STRAPI_URL: http://strapi:1337
      STRAPI_API_TOKEN: your-api-token-here
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      RESEND_API_KEY: re_xxx
    ports:
      - "3000:3000"
    depends_on:
      - strapi

volumes:
  mariadb_data:
